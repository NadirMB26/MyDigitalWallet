<ion-header>
  <ion-toolbar>
    <ion-title>Editar Tarjeta</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">Cerrar</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="auth-content">
  <div class="auth-container">
    <ion-card class="auth-card">

      <!-- Tarjeta visual -->
<div class="card-preview"
     [ngClass]="{
       'visa-card': detectBrand(card.cardNumber) === 'Visa',
       'mastercard-card': detectBrand(card.cardNumber) === 'Mastercard',
       'unknown-card': detectBrand(card.cardNumber) !== 'Visa' && detectBrand(card.cardNumber) !== 'Mastercard'
     }">

  <div class="card-header">
    <h3>{{ detectBrand(card.cardNumber) }}</h3>
    <img *ngIf="detectBrand(card.cardNumber) === 'Visa'" src="assets/icon/visa.png" alt="Visa Logo" class="card-logo">
    <img *ngIf="detectBrand(card.cardNumber) === 'Mastercard'" src="assets/icon/mastercard.png" alt="Mastercard Logo" class="card-logo">
    <img *ngIf="detectBrand(card.cardNumber) !== 'Visa' && detectBrand(card.cardNumber) !== 'Mastercard'" src="assets/icon/unknown.svg" alt="Unknown Logo" class="card-logo">
  </div>

  <p class="card-name">{{ card.cardholderName || 'YOUR NAME' }}</p>
  <p class="card-number">{{ formatCardNumber(card.cardNumber) }}</p>
  <p class="card-expiry">{{ card.expiryDate || 'MM/YY' }}</p>
</div>


      <!-- Inputs -->
      <ion-card-content>
        <ion-item class="custom-input">
          <ion-label position="stacked">Nombre del Titular</ion-label>
          <ion-input [(ngModel)]="card.cardholderName"></ion-input>
        </ion-item>

        <ion-item class="custom-input">
          <ion-label position="stacked">Número</ion-label>
          <ion-input [(ngModel)]="card.cardNumber"></ion-input>
        </ion-item>

        <ion-item class="custom-input">
          <ion-label position="stacked">Fecha Expiración</ion-label>
          <ion-input [(ngModel)]="card.expiryDate"></ion-input>
        </ion-item>
      </ion-card-content>

      <!-- Botón -->
      <ion-button expand="block" (click)="save()">Guardar</ion-button>
    </ion-card>
  </div>
</ion-content>
