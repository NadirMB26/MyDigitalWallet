<ion-content>
  <div class="auth-container">
    <div class="header-blob"></div>

    <div class="auth-header">
      <button class="back-btn" routerLink="/login">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="#f0f0f8" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="header-tag">Crear cuenta</span>
      <h1>Register</h1>
      <p>Create your account!</p>
    </div>

    <div class="auth-form">

      <div class="field-row">
        <div class="field-wrapper">
          <label class="field-label">Nombre</label>
          <div class="field-box">
            <input type="text" [(ngModel)]="name" placeholder="Juan"/>
          </div>
        </div>
        <div class="field-wrapper">
          <label class="field-label">Apellido</label>
          <div class="field-box">
            <input type="text" [(ngModel)]="lastName" placeholder="Pérez"/>
          </div>
        </div>
      </div>

      <div class="field-wrapper">
        <label class="field-label">Tipo de Documento</label>
        <div class="field-box select-box">
          <select [(ngModel)]="documentType">
            <option value="" disabled selected>Seleccionar</option>
            <option value="CC">Cédula</option>
            <option value="TI">Tarjeta de Identidad</option>
            <option value="CE">Cédula de Extranjería</option>
            <option value="PAS">Pasaporte</option>
          </select>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" class="select-arrow">
            <path d="M2 4l4 4 4-4" stroke="#7070a0" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="field-wrapper">
        <label class="field-label">Número de Documento</label>
        <div class="field-box">
          <input type="text" [(ngModel)]="documentNumber" placeholder="123456789"/>
        </div>
      </div>

      <div class="field-wrapper">
        <label class="field-label">Departamento</label>
        <div class="field-box select-box">
          <select [(ngModel)]="country">
            <option value="" disabled selected>Seleccionar</option>
            <option *ngFor="let dep of departments" [value]="dep.name">{{ dep.name }}</option>
          </select>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" class="select-arrow">
            <path d="M2 4l4 4 4-4" stroke="#7070a0" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="field-wrapper">
        <label class="field-label">Email</label>
        <div class="field-box">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="3" width="14" height="10" rx="2" stroke="#a8e63d" stroke-width="1.4"/>
            <path d="M1 5l7 5 7-5" stroke="#a8e63d" stroke-width="1.4"/>
          </svg>
          <input type="email" [(ngModel)]="email" placeholder="tu@email.com"/>
        </div>
      </div>

      <div class="field-wrapper">
        <label class="field-label">Contraseña</label>
        <div class="field-box">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="#a8e63d" stroke-width="1.4"/>
            <path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke="#a8e63d" stroke-width="1.4"/>
          </svg>
          <input type="password" [(ngModel)]="password" placeholder="••••••••"/>
        </div>
      </div>

      <button class="btn-login" (click)="register()">REGISTER</button>

      <div class="auth-link">
        <span>I have an account?</span>
        <a routerLink="/login">Log in</a>
      </div>

    </div>
  </div>
</ion-content>
