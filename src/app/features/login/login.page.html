<ion-content class="auth-content">
  <div class="auth-container">
    <ion-card class="auth-card">
      <ion-card-header>
        <ion-card-title>Login</ion-card-title>
        <ion-card-subtitle>Welcome back!</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <ion-item class="custom-input">
          <ion-input placeholder="Email" [(ngModel)]="email"></ion-input>
        </ion-item>

        <ion-item class="custom-input">
          <ion-input placeholder="Password" type="password" [(ngModel)]="password"></ion-input>
        </ion-item>

        <ion-button expand="block" class="auth-btn" (click)="login()">Login</ion-button>

        <ion-button expand="block" class="google-btn" (click)="loginGoogle()">
          <ion-icon slot="start" name="logo-google"></ion-icon>
          Login con Google
        </ion-button>

        <ion-button class="biometric-btn" fill="clear" >
          <ion-icon slot="start" name="finger-print"></ion-icon>
          <strong>Biometric Sign In</strong>
        </ion-button>

        <div class="auth-link">
          <span>No tienes cuenta?</span>
          <a routerLink="/register">Registrarse</a>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
