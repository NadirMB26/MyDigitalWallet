<ion-content>
  <div class="auth-container">

    <div class="header-blob"></div>

    <div class="auth-header">
      <span class="header-tag">Bienvenido</span>
      <h1>Sign in to your<br>Account</h1>
      <p>Sign in to your Account</p>
    </div>

    <div class="auth-form">

      <ng-container *ngIf="isLoading || isGoogleLoading; else formContent">
        <div class="skeleton-box"></div>
        <div class="skeleton-box"></div>
        <div class="skeleton-btn"></div>
        <div class="skeleton-btn"></div>
      </ng-container>

      <ng-template #formContent>

        <div class="field-wrapper">
          <label class="field-label">Email</label>
          <div class="field-box">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="3" width="14" height="10" rx="2" stroke="#a8e63d" stroke-width="1.4"/>
              <path d="M1 5l7 5 7-5" stroke="#a8e63d" stroke-width="1.4"/>
            </svg>
            <input type="email" [(ngModel)]="email"
              placeholder="tu@email.com" [disabled]="isLoading"/>
          </div>
        </div>

        <div class="field-wrapper">
          <label class="field-label">Password</label>
          <div class="field-box">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="#a8e63d" stroke-width="1.4"/>
              <path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke="#a8e63d" stroke-width="1.4"/>
            </svg>
            <input type="password" [(ngModel)]="password"
              placeholder="••••••••" [disabled]="isLoading"/>
          </div>
        </div>

        <div class="forgot-row">
          <a>Forgot Password?</a>
        </div>

        <button class="btn-login" (click)="login()" [disabled]="isLoading">
          <span *ngIf="isLoading" class="spinner"></span>
          {{ isLoading ? 'Ingresando...' : 'LOGIN' }}
        </button>

        <div class="or-divider">
          <div class="line"></div>
          <span>Or login with</span>
          <div class="line"></div>
        </div>

        <button class="btn-google" (click)="loginGoogle()" [disabled]="isGoogleLoading">
          <svg width="16" height="16" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          {{ isGoogleLoading ? 'Conectando...' : 'GOOGLE' }}
        </button>

        <button class="btn-biometric">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M12 1C8 1 5 4 5 8v2" stroke="#a8e63d" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M19 10V8a7 7 0 00-14 0" stroke="#a8e63d" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M12 11v6M9 13v2M15 13v2" stroke="#a8e63d" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M5 14c0 4 3 7 7 7s7-3 7-7" stroke="#a8e63d" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          BIOMETRIC SIGN IN
        </button>

        <div class="auth-link">
          <span>Don't have an account?</span>
          <a routerLink="/register">Register</a>
        </div>

      </ng-template>
    </div>
  </div>
</ion-content>
